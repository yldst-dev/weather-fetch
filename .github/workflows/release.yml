name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Validate tag matches package version
        shell: bash
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [[ "$TAG_VERSION" != "$PACKAGE_VERSION" ]]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)." >&2
            exit 1
          fi

      - run: npm run check
      - run: npm run test
      - run: npm run build

      - name: Pack npm tarball
        id: pack
        shell: bash
        run: |
          set -euo pipefail
          PACK_JSON="$(npm pack --json --ignore-scripts)"
          PACK_FILE="$(printf '%s\n' "$PACK_JSON" | node -e "const fs = require('node:fs'); const parsed = JSON.parse(fs.readFileSync(0, 'utf8')); if (!Array.isArray(parsed) || !parsed[0]?.filename) { process.exit(1); } console.log(parsed[0].filename)")"
          echo "file=$PACK_FILE" >> "$GITHUB_OUTPUT"

      - name: Create or update draft GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_ID="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${GITHUB_REF_NAME}" --jq .id 2>/dev/null || true)"
          if [[ -n "$RELEASE_ID" ]]; then
            gh release upload "${GITHUB_REF_NAME}" "${{ steps.pack.outputs.file }}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" "${{ steps.pack.outputs.file }}" \
              --draft \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes
          fi

      - name: Publish to npm
        run: npm publish --provenance --access public

      - name: Publish GitHub release
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_ID="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${GITHUB_REF_NAME}" --jq .id)"
          gh api --method PATCH "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}" -f draft=false >/dev/null
